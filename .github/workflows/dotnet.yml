name: Build & Push to Docker Hub

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  IMAGE_NAME: libroslibres/api-libroslibre-py
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # 3. Restaurar dependencias
      - name: Restore dependencies
        run: dotnet restore

      # 4. Build
      - name: Build
        run: dotnet build --no-restore -c Release

      # 5. Tests
      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal
        env:
          # Variables solo para los tests
          ConnectionStrings__Default: ${{ secrets.TEST_DB_CONNECTION }}

      # 6. Login a Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}  # Usar Access Token, no contraseña

      # 7. Configurar Docker Buildx (para multi-platform)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 8. Build y Push de la imagen
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}  # Solo push en main
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          # Build-args para tiempo de BUILD (solo si los necesita el Dockerfile)
          build-args: |
            BUILD_ENV=production
          # Cache para builds más rápidos
          cache-from: type=gha
          cache-to: type=gha,mode=max